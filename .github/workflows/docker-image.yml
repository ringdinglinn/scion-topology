name: Running Docker Image on Ubuntu

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: make up

    - name: Wait for containers to start
      run: sleep 10

    - name: Run tests
      run: make test
